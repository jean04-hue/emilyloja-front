<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin Teste</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
    }

    input, textarea, select, button {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    img {
      display: block;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      gap: 8px;
    }

    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      background: #dfe8df;
      color: #2e7d32;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      background: #2e7d32;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Painel Admin - Teste Limpo</h1>

    <div class="tabs">
      <div class="tab active" onclick="selecionarAba('cadastro')">Cadastrar Produto</div>
      <div class="tab" onclick="selecionarAba('ver')">Ver Produtos</div>
    </div>

    <div id="cadastro" class="tab-content active">
      <h2>Cadastrar Novo Produto</h2>

      <form id="formCadastro">
        <label for="nome">Nome do produto</label>
        <input type="text" id="nome" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao" rows="3" required></textarea>

        <label for="preco">Preço (R$)</label>
        <input type="number" id="preco" step="0.01" required>

        <label for="estoque">Estoque</label>
        <input type="number" id="estoque" required>

        <label for="categoria">Categoria</label>
        <select id="categoria" required>
          <option value="">Selecione a Categoria</option>
          <option value="vestidos">Vestidos</option>
          <option value="Blusas">Blusas</option>
          <option value="camisetas">Camisetas</option>
          <option value="Calças">Calças</option>
          <option value="Acessorios">Acessórios</option>
          <option value="Saia">Saia</option>
        </select>

        <label for="imagem">URL da Imagem</label>
        <input type="url" id="imagem" required>

        <button type="submit">Cadastrar</button>
      </form>
    </div>

    <div id="ver" class="tab-content">
      <h2>Produtos Cadastrados</h2>

      <table id="tabelaProdutos">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Categoria</th>
            <th>Imagem</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    function selecionarAba(abaId) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(content => content.classList.remove("active"));

      if (abaId === "cadastro") {
        document.querySelectorAll(".tab")[0].classList.add("active");
      } else {
        document.querySelectorAll(".tab")[1].classList.add("active");
      }

      document.getElementById(abaId).classList.add("active");
    }
  </script>

  <script type="module" src="admin-produtos.js"></script>
</body>
</html>
